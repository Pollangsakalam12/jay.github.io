<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Chie 🎓</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  text-align: center;
  background: #000;
  color: white;
  overflow-x: hidden;
  transition: background 2s;
}

/* INTRO */
#intro {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  z-index: 10;
}

/* HERO */
.hero {
  margin-top: 100px;
  opacity: 0;
  transition: 2s;
}

.hero.show {
  opacity: 1;
}

h1 {
  font-size: 3em;
  color: #ffd6e0;
}

/* PHOTO */
.photo img {
  width: 260px;
  border-radius: 20px;
  margin-top: 20px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.6);
}

/* TEXT */
.text {
  max-width: 700px;
  margin: 80px auto;
  font-size: 1.2em;
  line-height: 1.9;
  opacity: 0;
  transition: 2s;
}

.text.show {
  opacity: 1;
}

/* BUTTON */
button {
  margin-top: 30px;
  padding: 10px 20px;
  background: #ffd6e0;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <h2>Click… I made this for you 💌</h2>
</div>

<!-- MUSIC -->
<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<!-- HERO -->
<div class="hero" id="hero">
  <h1>Congratulations, Chie 🎓</h1>
</div>

<!-- PHOTO -->
<div class="photo">
  <img src="photo.jpg">
</div>

<!-- TEXT -->
<div class="text" id="text"></div>
<button id="next" style="display:none;">Continue</button>

<script>
const intro = document.getElementById("intro");
const music = document.getElementById("music");
const hero = document.getElementById("hero");
const text = document.getElementById("text");
const nextBtn = document.getElementById("next");

const parts = [

`Hi, Chie.

Gusto ko magsimula sa thank you as gratitude.
Happy 10 months of friendship, Chie!! Grabe… ang tagal na rin pala, no? Parang ang bilis lang ng panahon, pero at the same time, ang dami na rin nating pinagdaanan kahit sa simple conversation noh.`,

`Naalala ko pa nung first time tayong nag-chat. Ang tagal mong mag-reply noon 😭 to the point na akala ko bata ka lang, mga 13–15 years old HAHAHA. Hindi ko inexpect na darating yung time na ikaw na ‘to ngayon—graduating, 18 years old, si Kutchie Ebrano Viña. Nakakatuwa lang isipin na from that simple start, naging ganito ka-importante yung presence mo sa buhay ko.`,

`Chie, sa totoo lang… ikaw yung isa sa pinaka genuine na taong nakilala ko you are the only friend that I considered. Yung tipong sobrang bait mo, marunong ka mag-appreciate even little things, and ang babaw pa ng kaligayahan mo HAHAH . Ang dali mong pasayahin, pero at the same time, ang lalim din ng pagkatao mo. And honestly… you’re just so naturally beautiful, inside and out. Yung tipong hindi mo kailangan mag-effort para maging special—kasi ikaw na ‘yun eh.`,

`Hindi ko rin maitatanggi… habang tumatagal, I found myself slowly falling. Hindi ko naman plan ‘yun, nangyari lang. Kasi you became exactly the kind of person I admire. Pero alam mo naman… may mga bagay na hindi talaga para sa’tin, and maybe this is one of those. Kaya instead of focusing on that, mas pinili kong i-value kung ano meron tayo ngayon—because having you in my life is already something I’m grateful for.`,

`And now, look at you… graduating. I’m really, really proud of you, Chie. Hindi lang dahil natapos mo yung isang chapter ng buhay mo, pero dahil kinaya mo lahat ng challenges na dinaanan mo. You deserve this moment. Lahat ng pagod, puyat, hirap—worth it lahat ‘yan. This is your victory, and I hope you truly feel how special this moment is.`,

`Chie, gusto ko lang ipaalala sa’yo… I’m always here. I may not that active, I may not okay in the moment, or I may busy, gagawa at gagawa ako ng oras para sa’yo. If dumating yung time na feeling mo wala kang malapitan, nandito lang ako. You can talk to me, vent out, sabihin mo lahat. Gagawin nating magaan ‘yan, okay?`,

`I’ll be your second comfort zone kapag mabigat na lahat. Kapag parang ang gulo na ng mundo, I’ll try to be your peace. Kapag parang ang dilim na, I’ll be there to remind you na may liwanag pa rin. I’ll remind you na everything happens for a reason, even if hindi mo pa siya naiintindihan ngayon. One day, everything will make sense.`,

`Alam mo, every pain, every struggle… hindi lang siya basta paghihirap. It’s growth. It’s you becoming stronger, wiser, and better. And I believe in you, Chie. I always have.`,

`As you step into a bigger world, mas marami ka pang makikilala—iba’t ibang tao, iba’t ibang ugali. May mga magiging mabuti, may mga hindi. Kaya please… choose your circle wisely. Kasi kung sino yung mga taong nakapaligid sa’yo, sila rin yung makaka-influence kung sino ka magiging. You deserve people who will lift you up, not bring you down.`,

`This is your next level in life. New environment, new experiences, new challenges. But don’t forget to enjoy everything, okay? Hindi lahat kailangang seryosohin. Take your time, live your moments, and don’t be too hard on yourself.`,

`And no matter what happens…
I’ll always be here, silently supporting you, cheering for you, and believing in you.

Congratulations, Chie. 🎓
I’m so proud of you. Always.`

];

let index = 0;

function showText() {
  text.classList.remove("show");
  setTimeout(() => {
    text.innerText = parts[index];
    text.classList.add("show");
  }, 300);
}

nextBtn.onclick = () => {
  index++;
  if(index < parts.length){
    showText();
  } else {
    nextBtn.style.display = "none";
  }
};

intro.onclick = () => {
  intro.style.display = "none";
  music.play();
  hero.classList.add("show");
  showText();
  nextBtn.style.display = "inline-block";
};
</script>

</body>
</html>
